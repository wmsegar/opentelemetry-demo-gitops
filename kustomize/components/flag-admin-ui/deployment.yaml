apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-admin-ui
  namespace: astroshop
  labels:
    app.kubernetes.io/name: flag-admin-ui
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flag-admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flag-admin-ui
        app.kubernetes.io/component: admin
    spec:
      containers:
        - name: flag-admin-ui
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/server.js
          env:
            - name: ADMIN_UI_PORT
              value: "8080"
            - name: APP_BASE_PATH
              value: /admin
            - name: GITHUB_OWNER
              value: wmsegar
            - name: GITHUB_REPO
              value: opentelemetry-demo-gitops
            - name: GITHUB_BASE_BRANCH
              value: main
            - name: GITHUB_WORK_BRANCH
              value: admin/flag-toggles
            - name: FLAGS_FILE_PATH
              value: kustomize/components/flagd-config/demo.flagd.json
            - name: GITHUB_PR_TITLE
              value: Admin UI feature flag updates
            - name: GITHUB_PR_BODY
              value: This PR was created by the Astroshop feature flag admin UI to update demo flag defaults.
            - name: ADMIN_UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flag-admin-ui-secrets
                  key: username
                  optional: true
            - name: ADMIN_UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flag-admin-ui-secrets
                  key: password
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flag-admin-ui-secrets
                  key: githubToken
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /admin/healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /admin/healthz
              port: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: flag-admin-ui-app
