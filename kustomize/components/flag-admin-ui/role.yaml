apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flag-admin-ui
  namespace: astroshop
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - flagd-config
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - apps
    resources:
      - deployments
    resourceNames:
      - flagd
    verbs:
      - get
      - patch
