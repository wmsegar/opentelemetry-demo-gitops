components:
  dt-credentials:
    enabled: true
    # Set your Dynatrace OTLP endpoint in values.local.yaml, e.g.
    # tenantEndpoint: https://wkf10640.live.dynatrace.com/api/v2/otlp
    # Set your Dynatrace API token in values.local.yaml, e.g.
    # tenantToken: dt0c01.abc.xxx
  flag-admin-ui:
    # Set these in values.local.yaml to have deploy generate the
    # flag-admin-ui-secrets Secret automatically.
    # authUsername: admin
    # Quote authPassword if it contains special YAML characters such as # or :
    # authPassword: "change-me"
    # githubToken: ghp_xxx
