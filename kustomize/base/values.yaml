components:
  dt-credentials:
    enabled: false
    # Legacy option: set enabled=true and provide tenantEndpoint/tenantToken
    # in values.local.yaml only if you explicitly want the chart to create
    # the shared dt-credentials secret.
  flag-admin-ui:
    # Set these in values.local.yaml to have deploy generate the
    # flag-admin-ui-secrets Secret automatically.
    # authUsername: admin
    # Quote authPassword if it contains special YAML characters such as # or :
    # authPassword: "change-me"
    # githubToken: ghp_xxx

opentelemetry-demo:
  opentelemetry-collector:
    extraEnvsFrom:
      - secretRef:
          name: otel-collector-dt-credentials
